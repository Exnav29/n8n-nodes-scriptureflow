name: Publish to npm with provenance

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Validate and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm trusted publishing support
        shell: bash
        run: |
          npm_version="$(npm --version)"
          node --version
          echo "npm ${npm_version}"
          echo "registry $(npm config get registry)"
          node -e "const [major, minor, patch] = process.argv[1].split('.').map(Number); if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) { throw new Error('npm 11.5.1 or later is required for trusted publishing'); }" "${npm_version}"

      - name: Verify release tag matches package version
        run: node -e "const expected = 'v' + require('./package.json').version; if (process.env.GITHUB_REF_NAME !== expected) throw new Error('Release tag ' + process.env.GITHUB_REF_NAME + ' does not match package version ' + expected);"

      - name: Verify package metadata for trusted publishing
        run: |
          node -e "const p = require('./package.json'); console.log(JSON.stringify({ name: p.name, version: p.version, license: p.license, repository: p.repository, hasDependencies: Boolean(p.dependencies), keywords: p.keywords }, null, 2)); if (p.name !== 'n8n-nodes-scriptureflow') throw new Error('Unexpected package name'); if (!p.version) throw new Error('Missing package version'); if (p.license !== 'MIT') throw new Error('Expected MIT license'); if (p.repository?.url !== 'git+https://github.com/Exnav29/n8n-nodes-scriptureflow.git') throw new Error('Unexpected repository URL'); if (p.dependencies) throw new Error('Runtime dependencies are not expected'); if (!p.keywords?.includes('n8n-community-node-package')) throw new Error('Missing n8n community package keyword');"

      - name: Inspect trusted publishing token environment
        shell: bash
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN present: yes"
            echo "::error::NPM_TOKEN is set. This release workflow must not use a legacy npm token; it must rely on GitHub Actions OIDC trusted publishing only."
            exit 1
          fi
          echo "NPM_TOKEN present: no"

          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NODE_AUTH_TOKEN present: yes"
          else
            echo "NODE_AUTH_TOKEN present: no"
          fi

          echo "No explicit legacy npm token path is configured. npm publish will rely on GitHub Actions OIDC."

      - name: Inspect npm registry package state
        run: |
          npm view n8n-nodes-scriptureflow version
          npm view n8n-nodes-scriptureflow versions --json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Preview npm package contents
        run: npm pack --dry-run --ignore-scripts

      - name: Publish package with provenance
        run: npm publish --provenance --access public --ignore-scripts
