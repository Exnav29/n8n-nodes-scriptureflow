name: Package Readiness (No Publish)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - nodes/**
      - docs/**
      - .github/workflows/package-readiness.yml

permissions:
  contents: read

jobs:
  validate-package:
    name: Validate package without publishing
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Preview npm package contents
        run: npm pack --dry-run --ignore-scripts
